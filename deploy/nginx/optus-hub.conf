limit_req_zone $binary_remote_addr zone=optus_hub_api:10m rate=10r/s;

server {
  listen 80;
  listen [::]:80;
  server_name _;

  server_tokens off;
  client_max_body_size 10m;

  access_log /var/log/nginx/optus-hub-access.log;
  error_log /var/log/nginx/optus-hub-error.log;

  location / {
    limit_req zone=optus_hub_api burst=20 nodelay;
    proxy_pass http://127.0.0.1:8000;
    proxy_http_version 1.1;
    proxy_connect_timeout 5s;
    proxy_read_timeout 30s;
    proxy_send_timeout 30s;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'; base-uri 'none'" always;
  }
}
